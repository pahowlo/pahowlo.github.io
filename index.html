<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under Construction</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #1a1a1a;
      font-family: -apple-system, system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }


    .text {
      position: absolute;
      width: 100%;
      text-align: center;
      color: #fff;
      top: 20px;
      animation: glow 2s ease-in-out infinite;
    }

    h1 {
      font-size: 2rem;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    @keyframes glow {
      50% {
        text-shadow: 0 0 20px #8a8a8a;
      }
    }

    .scene {
      position: relative;
      width: 300px;
      height: 300px;
    }

    .road {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 60px;
      background: #333;
      border-top: 4px solid #ff9800;
      border-bottom: 4px solid #ff9800;
      clip-path: inset(0);
    }

    .stripe {
      position: absolute;
      top: 45%;
      transform: translateY(-55%);
      width: 60px;
      height: 8px;
      background: #fff;
      animation: moveStripe 5s linear infinite;
      clip-path: inset(0);
    }

    @keyframes moveStripe {
      from {
        transform: translateX(300px);
      }

      to {
        transform: translateX(-60px);
      }
    }

    .cone {
      position: absolute;
      bottom: 70px;
      width: 30px;
      height: 40px;
      animation:
        bounce 0.1s ease-in-out infinite,
        wobble-small 0.2s ease-in-out infinite,
        wobble-big 1s ease-in-out infinite;
    }

    .cone-body {
      width: 100%;
      height: 100%;
      background: #ff9800;
      clip-path: polygon(50% 0%, 90% 80%, 100% 100%, 0 100%, 10% 80%);
    }

    .cone-base {
      position: absolute;
      bottom: -2px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 2px;
      background: #cc7a00;
      border-radius: 2px;
    }

    .cone:nth-child(1) {
      left: 20px;
    }

    .cone:nth-child(2) {
      right: 20px;
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    @keyframes wobble-small {

      0%,
      100% {
        transform: rotate(0deg);
      }

      50% {
        transform: rotate(2deg);
      }
    }

    @keyframes wobble-big {

      0%,
      100% {
        transform: rotate(0deg);
      }

      50% {
        transform: rotate(-1deg);
      }
    }

    /* Reflective strip */
    .cone-body::after {
      content: '';
      position: absolute;
      top: 15px;
      left: 0;
      width: 100%;
      height: 8px;
      background: white;
      clip-path: polygon(10% 0%, 90% 0%, 100% 100%, 0% 100%);
    }
  </style>
</head>

<body>
  <div class="scene">
    <div class="text">
      <h1>Under Construction</h1>
    </div>
    <div class="cone">
      <div class="cone-body"></div>
      <div class="cone-base"></div>
    </div>
    <div class="road">
      <div class="stripe"></div>
    </div>
  </div>
</body>

</html>
